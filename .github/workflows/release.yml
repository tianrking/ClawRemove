name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot dpkg-dev file zip

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          DIST_DIR="${PWD}/dist"
          mkdir -p "${DIST_DIR}"
          > "${DIST_DIR}/sha256sums.txt"

          targets=(
            # macOS
            "darwin amd64"
            "darwin arm64"
            # Linux
            "linux amd64"
            "linux arm64"
            "linux 386"
            "linux arm"
            "linux riscv64"
            "linux ppc64le"
            "linux s390x"
            "linux mips64"
            "linux mips64le"
            # Windows
            "windows amd64"
            "windows arm64"
            "windows 386"
            # FreeBSD
            "freebsd amd64"
            "freebsd arm64"
            # NetBSD
            "netbsd amd64"
            # OpenBSD
            "openbsd amd64"
          )

          for target in "${targets[@]}"; do
            goos="${target%% *}"
            goarch="${target##* }"
            suffix=""
            archive_ext=".tar.gz"
            if [[ "${goos}" == "windows" ]]; then
              suffix=".exe"
              archive_ext=".zip"
            fi

            binary_name="claw-remove-${goos}-${goarch}${suffix}"
            echo "==> Building ${goos}/${goarch}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=${VERSION}" \
              -o "${DIST_DIR}/${binary_name}" ./cmd/claw-remove

            echo "==> Packaging ${goos}/${goarch}"
            archive_name="claw-remove-${goos}-${goarch}${archive_ext}"
            cd "${DIST_DIR}"
            if [[ "${goos}" == "windows" ]]; then
              zip -q "${archive_name}" "${binary_name}"
            else
              tar -czf "${archive_name}" "${binary_name}"
            fi
            shasum -a 256 "${archive_name}" >> sha256sums.txt
            cd - > /dev/null
          done

          echo "==> Release artifacts generated in ${DIST_DIR}"
          ls -la "${DIST_DIR}"

      - name: Create deb packages
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # amd64
          mkdir -p pkg-deb-amd64/usr/bin
          cp dist/claw-remove-linux-amd64 pkg-deb-amd64/usr/bin/claw-remove
          chmod 755 pkg-deb-amd64/usr/bin/claw-remove
          mkdir -p pkg-deb-amd64/DEBIAN
          cat > pkg-deb-amd64/DEBIAN/control << EOF
          Package: claw-remove
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ClawRemove Team
          Description: Agent Environment Inspector
           Inspect, audit and clean environments where AI agents run.
          EOF
          dpkg-deb -b pkg-deb-amd64 dist/claw-remove_${VERSION}_amd64.deb
          # arm64
          mkdir -p pkg-deb-arm64/usr/bin
          cp dist/claw-remove-linux-arm64 pkg-deb-arm64/usr/bin/claw-remove
          chmod 755 pkg-deb-arm64/usr/bin/claw-remove
          mkdir -p pkg-deb-arm64/DEBIAN
          cat > pkg-deb-arm64/DEBIAN/control << EOF
          Package: claw-remove
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: ClawRemove Team
          Description: Agent Environment Inspector
           Inspect, audit and clean environments where AI agents run.
          EOF
          dpkg-deb -b pkg-deb-arm64 dist/claw-remove_${VERSION}_arm64.deb
          # armhf
          mkdir -p pkg-deb-armhf/usr/bin
          cp dist/claw-remove-linux-arm pkg-deb-armhf/usr/bin/claw-remove
          chmod 755 pkg-deb-armhf/usr/bin/claw-remove
          mkdir -p pkg-deb-armhf/DEBIAN
          cat > pkg-deb-armhf/DEBIAN/control << EOF
          Package: claw-remove
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: armhf
          Maintainer: ClawRemove Team
          Description: Agent Environment Inspector
           Inspect, audit and clean environments where AI agents run.
          EOF
          dpkg-deb -b pkg-deb-armhf dist/claw-remove_${VERSION}_armhf.deb

      - name: Create rpm packages
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # x86_64
          mkdir -p pkg-rpm-x64/BUILD pkg-rpm-x64/RPMS pkg-rpm-x64/SOURCES pkg-rpm-x64/SPECS pkg-rpm-x64/SRPMS
          cat > pkg-rpm-x64/SPECS/claw-remove.spec << EOF
          Name: claw-remove
          Version: ${VERSION}
          Release: 1
          Summary: Agent Environment Inspector
          License: MIT
          URL: https://github.com/tianrking/ClawRemove

          %description
          Inspect, audit and clean environments where AI agents run.

          %prep

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/claw-remove %{buildroot}/usr/bin/claw-remove
          chmod 755 %{buildroot}/usr/bin/claw-remove

          %files
          /usr/bin/claw-remove

          %changelog
          * $(date '+%a %b %d %Y') ClawRemove Team <noreply@github.com> - ${VERSION}-1
          - Release ${VERSION}
          EOF
          cp dist/claw-remove-linux-amd64 pkg-rpm-x64/SOURCES/claw-remove
          rpmbuild --define "_topdir ${PWD}/pkg-rpm-x64" --define "_sourcedir ${PWD}/pkg-rpm-x64/SOURCES" -bb pkg-rpm-x64/SPECS/claw-remove.spec
          mv pkg-rpm-x64/RPMS/x86_64/claw-remove-*.rpm dist/claw-remove-${VERSION}-1.x86_64.rpm
          # aarch64
          mkdir -p pkg-rpm-arm64/BUILD pkg-rpm-arm64/RPMS pkg-rpm-arm64/SOURCES pkg-rpm-arm64/SPECS pkg-rpm-arm64/SRPMS
          cat > pkg-rpm-arm64/SPECS/claw-remove.spec << EOF
          Name: claw-remove
          Version: ${VERSION}
          Release: 1
          Summary: Agent Environment Inspector
          License: MIT
          URL: https://github.com/tianrking/ClawRemove
          BuildArch: aarch64

          %description
          Inspect, audit and clean environments where AI agents run.

          %prep

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/claw-remove %{buildroot}/usr/bin/claw-remove
          chmod 755 %{buildroot}/usr/bin/claw-remove

          %files
          /usr/bin/claw-remove

          %changelog
          * $(date '+%a %b %d %Y') ClawRemove Team <noreply@github.com> - ${VERSION}-1
          - Release ${VERSION}
          EOF
          cp dist/claw-remove-linux-arm64 pkg-rpm-arm64/SOURCES/claw-remove
          rpmbuild --define "_topdir ${PWD}/pkg-rpm-arm64" --define "_sourcedir ${PWD}/pkg-rpm-arm64/SOURCES" --target aarch64 -bb pkg-rpm-arm64/SPECS/claw-remove.spec || true
          if [ -f pkg-rpm-arm64/RPMS/aarch64/claw-remove-*.rpm ]; then
            mv pkg-rpm-arm64/RPMS/aarch64/claw-remove-*.rpm dist/claw-remove-${VERSION}-1.aarch64.rpm
          fi

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p AppDir/usr/bin
          cp dist/claw-remove-linux-amd64 AppDir/usr/bin/claw-remove
          chmod 755 AppDir/usr/bin/claw-remove
          cat > AppDir/claw-remove.desktop << EOF
          [Desktop Entry]
          Name=ClawRemove
          Exec=claw-remove
          Icon=claw-remove
          Type=Application
          Categories=Utility;
          EOF
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir dist/claw-remove-${VERSION}-x86_64.AppImage || true

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/sha256sums.txt

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build universal binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Build for both architectures
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=${VERSION}" \
            -o claw-remove-amd64 ./cmd/claw-remove
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=${VERSION}" \
            -o claw-remove-arm64 ./cmd/claw-remove
          # Create universal binary
          lipo -create -output claw-remove claw-remove-amd64 claw-remove-arm64
          chmod +x claw-remove

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar -czf claw-remove-${VERSION}-darwin-universal.tar.gz claw-remove README.md LICENSE
          shasum -a 256 claw-remove-${VERSION}-darwin-universal.tar.gz > checksums-macos.txt

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p dmg-temp
          cp claw-remove dmg-temp/
          cp README.md dmg-temp/
          cp LICENSE dmg-temp/
          hdiutil create -volname "ClawRemove ${VERSION}" \
            -srcfolder dmg-temp -ov -format UDZO \
            claw-remove-${VERSION}-macOS.dmg

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            claw-remove-*.tar.gz
            claw-remove-*.dmg
            checksums-macos.txt

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows binaries
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/', ''
          # x64
          $env:GOOS='windows'; $env:GOARCH='amd64'; $env:CGO_ENABLED='0'
          go build -trimpath -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=$VERSION" -o claw-remove-x64.exe ./cmd/claw-remove
          # ARM64
          $env:GOARCH='arm64'
          go build -trimpath -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=$VERSION" -o claw-remove-arm64.exe ./cmd/claw-remove
          # x86
          $env:GOARCH='386'
          go build -trimpath -ldflags="-s -w -X github.com/tianrking/ClawRemove/internal/app.Version=$VERSION" -o claw-remove-x86.exe ./cmd/claw-remove

      - name: Create ZIP archives
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/', ''
          Compress-Archive -Path claw-remove-x64.exe, README.md, LICENSE -DestinationPath claw-remove-$VERSION-windows-amd64.zip
          Compress-Archive -Path claw-remove-arm64.exe, README.md, LICENSE -DestinationPath claw-remove-$VERSION-windows-arm64.zip
          Compress-Archive -Path claw-remove-x86.exe, README.md, LICENSE -DestinationPath claw-remove-$VERSION-windows-386.zip

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            claw-remove-*-windows-*.zip
